# Render blueprint: a Dockerised web service + a free PostgreSQL.
# Apply via Render > Blueprints (New > Blueprint) pointing at this repo.
services:
  - type: web
    name: orderflow
    runtime: docker
    plan: free
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: JWT_SECRET            # signing key, generated once and kept by Render
        generateValue: true
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: orderflow-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: orderflow-db
          property: password
      # Render's connectionString is a postgres:// URL, which Spring can't use.
      # Inject the parts instead; application.yml assembles the jdbc:postgresql://
      # URL from these, so no manual SPRING_DATASOURCE_URL is needed.
      - key: DB_HOST
        fromDatabase:
          name: orderflow-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: orderflow-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: orderflow-db
          property: database

databases:
  - name: orderflow-db
    plan: free
